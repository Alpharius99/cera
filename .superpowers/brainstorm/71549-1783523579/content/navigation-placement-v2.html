<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cera Navigation Placement</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1f2328;
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 650;
      letter-spacing: 0;
    }
    p {
      line-height: 1.45;
    }
    .subtitle {
      margin: 0 0 24px;
      color: #586069;
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    .choice {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .choice:hover,
    .choice.selected {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
    }
    .mock {
      height: 270px;
      border: 1px solid #d8dee4;
      border-radius: 6px;
      background: #ffffff;
      overflow: hidden;
      position: relative;
    }
    .mock.doc-gutter {
      display: grid;
      grid-template-columns: 36px 1fr;
    }
    .mock.side-rail {
      display: grid;
      grid-template-columns: 78px 1fr;
    }
    .bars {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 13px;
      padding: 20px 7px;
      border-right: 1px solid #d8dee4;
      background: #f6f8fa;
    }
    .overlay .bars {
      position: absolute;
      left: 10px;
      top: 20px;
      width: 32px;
      padding: 8px 5px;
      border: 1px solid #d8dee4;
      border-radius: 5px;
      z-index: 2;
      box-shadow: 0 4px 12px rgba(31, 35, 40, 0.14);
    }
    .bar {
      border-radius: 99px;
      background: #24292f;
    }
    .l1 { width: 34px; height: 5px; opacity: 0.95; }
    .l2 { width: 28px; height: 4px; opacity: 0.82; }
    .l3 { width: 22px; height: 3px; opacity: 0.72; }
    .l4 { width: 16px; height: 2px; opacity: 0.62; }
    .l5 { width: 11px; height: 1px; opacity: 0.52; }
    .doc {
      padding: 20px 20px 20px 24px;
    }
    .side-rail .doc {
      padding-left: 18px;
    }
    .line {
      height: 8px;
      border-radius: 99px;
      background: #d0d7de;
      margin: 12px 0;
    }
    .heading {
      height: 14px;
      background: #57606a;
    }
    .meta {
      padding: 0 2px;
    }
    .meta h2 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .meta p {
      margin: 0;
      color: #57606a;
      font-size: 14px;
    }
    @media (max-width: 950px) {
      body {
        padding: 18px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Where should the header navigation bars live?</h1>
  <p class="subtitle">Click the option that best matches your intent, then reply in Codex with any nuance.</p>

  <div class="grid">
    <button class="choice" type="button" data-choice="document-gutter">
      <div class="mock doc-gutter" aria-hidden="true">
        <div class="bars">
          <div class="bar l1"></div>
          <div class="bar l3"></div>
          <div class="bar l4"></div>
          <div class="bar l1"></div>
          <div class="bar l5"></div>
        </div>
        <div class="doc">
          <div class="line heading" style="width: 62%"></div>
          <div class="line" style="width: 92%"></div>
          <div class="line" style="width: 86%"></div>
          <div class="line heading" style="width: 44%"></div>
          <div class="line" style="width: 95%"></div>
          <div class="line" style="width: 82%"></div>
        </div>
      </div>
      <div class="meta">
        <h2>A. Document gutter</h2>
        <p>A narrow strip inside the Cera webview, fixed to the left edge of the reading column.</p>
      </div>
    </button>

    <button class="choice" type="button" data-choice="side-rail">
      <div class="mock side-rail" aria-hidden="true">
        <div class="bars">
          <div class="bar l1"></div>
          <div class="bar l3"></div>
          <div class="bar l4"></div>
          <div class="bar l1"></div>
          <div class="bar l5"></div>
        </div>
        <div class="doc">
          <div class="line heading" style="width: 62%"></div>
          <div class="line" style="width: 92%"></div>
          <div class="line" style="width: 86%"></div>
          <div class="line heading" style="width: 44%"></div>
          <div class="line" style="width: 95%"></div>
          <div class="line" style="width: 82%"></div>
        </div>
      </div>
      <div class="meta">
        <h2>B. Wider side rail</h2>
        <p>A more deliberate left rail inside the webview, with room for hover expansion and labels.</p>
      </div>
    </button>

    <button class="choice" type="button" data-choice="floating-overlay">
      <div class="mock overlay" aria-hidden="true">
        <div class="bars">
          <div class="bar l1"></div>
          <div class="bar l3"></div>
          <div class="bar l4"></div>
          <div class="bar l1"></div>
          <div class="bar l5"></div>
        </div>
        <div class="doc">
          <div class="line heading" style="width: 62%"></div>
          <div class="line" style="width: 92%"></div>
          <div class="line" style="width: 86%"></div>
          <div class="line heading" style="width: 44%"></div>
          <div class="line" style="width: 95%"></div>
          <div class="line" style="width: 82%"></div>
        </div>
      </div>
      <div class="meta">
        <h2>C. Floating overlay</h2>
        <p>A compact strip that floats over the document edge and minimizes layout impact.</p>
      </div>
    </button>
  </div>

  <script>
    document.querySelectorAll(".choice").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".choice").forEach((other) => other.classList.remove("selected"));
        button.classList.add("selected");
      });
    });
  </script>
</body>
</html>
