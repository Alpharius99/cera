name: Package

# On-demand VSIX build (artifact only). Tag-triggered releases — building,
# attaching the VSIX to a GitHub Release, and publishing — live in release.yml.
on:
  workflow_dispatch:

jobs:
  vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: cera-vsix
          path: cera.vsix
          if-no-files-found: error
