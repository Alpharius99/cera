name: Package

# Repeatable VSIX packaging: run manually, or on a version tag. Publishing and
# changelog/release notes are handled separately (#30).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: cera-vsix
          path: cera.vsix
          if-no-files-found: error
