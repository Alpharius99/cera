name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Full test suite, split into two parallel jobs:
#   build      - compile (tsc) + webview bundle (esbuild) + the Vitest suite
#                (unit, webview UI, fidelity corpus, and theme guard)
#   integration - the @vscode/test-electron suite in a real Extension Host
jobs:
  build:
    name: Build & unit suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test

  integration:
    name: Integration (Extension Host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      # The integration suite launches a real VS Code Extension Host, which
      # needs a display; xvfb provides a virtual one on the Linux runner.
      - run: xvfb-run -a npm run test:integration
